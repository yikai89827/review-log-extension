name = "review-log-ws-server"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 使用 Durable Objects 来保持 WebSocket 连接状态
[durable_objects]
bindings = [{ name = "WEBSOCKET_SERVER", class_name = "WebSocketServer" }]

# Durable Objects 的迁移配置
[[migrations]]
tag = "v1"
new_classes = ["WebSocketServer"]

# 环境变量（可选）
# [vars]
# MAX_CONNECTIONS = 100
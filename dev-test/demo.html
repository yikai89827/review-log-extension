<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Review Log · 调试测试页</title>
  <script src="./review-log-mob-sdk.js?host=198.168.254.58:8088"></script>
  <style>
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 { font-size: 22px; }
    h3 { font-size: 16px; color: #475569; }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 16px;
      margin: 12px 0;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 14px;
      margin-right: 8px;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    .btn-goeasy { background: #22c55e; }
    .btn-goeasy:hover { background: #16a34a; }
    input {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
      width: 240px;
    }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow: auto; }
    .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status.connected { background: #dcfce7; color: #166534; }
    .status.disconnected { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>Review Log · 调试测试页</h1>
  <p>打开本页面后，扩展会自动 hook 所有 <code>console.*</code> 与用户操作。
    点击扩展图标打开侧边栏查看事件流，再点击「✨ 一键 AI 分析」进行归因分析。</p>

  <div class="card">
    <h3>1. 普通日志</h3>
    <button onclick="emitNormal()">输出 log/info/warn</button>
    <button onclick="emitDuplicates()">输出 3 条相同日志（应合并）</button>
  </div>

  <div class="card">
    <h3>2. 抛出错误</h3>
    <button onclick="emitError()">throw new Error</button>
    <button onclick="emitUnhandled()">Promise reject 未处理</button>
  </div>

  <div class="card">
    <h3>3. 用户事件</h3>
    <input id="search" placeholder="输入后按回车试试" />
    <p style="color:#64748b;font-size:12px">侧边栏会显示 click / input / submit / keydown 等动作。</p>
  </div>

  <div class="card">
    <h3>4. GoEasy WebSocket 测试</h3>
    <p>AppKey: <input type="text" id="appkey" value="BC-e65c9385836d46e2a8b408117de2fbdc" style="width:300px" /></p>
    <p>Host: <input type="text" id="goeasyHost" value="hangzhou.goeasy.io" style="width:200px" /></p>
    <p>频道: <input type="text" id="channel" value="review-log-channel" style="width:200px" /></p>
    <p>消息: <input type="text" id="message" value="Hello from Review Log SDK!" style="width:300px" /></p>
    <p>
      <button class="btn-goeasy" onclick="initGoEasy()">初始化连接</button>
      <span id="goeasyStatus" class="status disconnected">未连接</span>
    </p>
    <p>
      <button class="btn-goeasy" onclick="subscribeChannel()">订阅频道</button>
      <button class="btn-goeasy" onclick="publishMessage()">推送消息</button>
      <button class="btn-goeasy" onclick="disconnectGoEasy()">断开连接</button>
    </p>
    <pre id="goeasyLog" style="max-height:150px"></pre>
  </div>

  <pre id="out"></pre>

<script>
  const out = document.getElementById('out')
  const goeasyLogEl = document.getElementById('goeasyLog')

  function goeasyLog() {
    const text = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')
    goeasyLogEl.textContent += '[' + new Date().toLocaleTimeString() + '] ' + text + '\n'
  }

  function log() {
    const text = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')
    out.textContent += text + '\n'
  }

  function updateGoEasyStatus(connected) {
    const statusEl = document.getElementById('goeasyStatus')
    statusEl.textContent = connected ? '已连接' : '未连接'
    statusEl.className = 'status ' + (connected ? 'connected' : 'disconnected')
  }

  function initGoEasy() {
    const appkey = document.getElementById('appkey').value
    const host = document.getElementById('goeasyHost').value
    goeasyLog('初始化 GoEasy...')
    ReviewLogSDK.initGoEasy({
      appkey: appkey,
      host: host
    })
    // 等待连接成功
    setTimeout(() => {
      updateGoEasyStatus(ReviewLogSDK.isGoEasyConnected())
    }, 2000)
  }

  function subscribeChannel() {
    const channel = document.getElementById('channel').value
    goeasyLog('订阅频道:', channel)
    ReviewLogSDK.subscribeGoEasy({
      channel: channel,
      onMessage: function(msg) {
        goeasyLog('收到消息:', msg)
      }
    })
  }

  function publishMessage() {
    const channel = document.getElementById('channel').value
    const message = document.getElementById('message').value
    goeasyLog('推送消息到', channel, ':', message)
    ReviewLogSDK.publishGoEasy({
      channel: channel,
      content: message
    })
  }

  function disconnectGoEasy() {
    ReviewLogSDK.disconnectGoEasy()
    updateGoEasyStatus(false)
    goeasyLog('已断开连接')
  }

  function emitNormal() {
    console.log('用户点击了普通日志按钮', { ts: Date.now(), level: 'log' , text: '这是一条 log' , args: [1,2,3,4,5] })
    console.info('这是一条 info', document.body)
    console.warn('这是一条 warn',  document.querySelector('body'))
  }

  function emitDuplicates() {
    console.log('重复日志 - 1')
    console.log('重复日志 - 1')
    console.log('重复日志 - 1')
    console.log('重复日志 - 1')
    console.log('重复日志 - 1')
  }

  function emitError() {
    try {
      const x = null
      x.boom()
    } catch (e) {
      console.error('捕获到异常：', e)
    }
  }

  function emitUnhandled() {
    Promise.reject(new Error('这是一个未处理的 Promise reject'))
  }

  document.getElementById('search').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') log('搜索：', e.target.value)
  })
  document.getElementById('search').addEventListener('input', (e) => {
    if (Math.random() < 0.05) console.log('input 中：', e.target.value)
  })
</script>
</body>
</html>
